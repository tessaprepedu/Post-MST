document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"><span style=\"font:700 12px 'Poppins VN';color:#8A9BB5\">Câu 11<\u002Fspan><span style=\"font:700 10.5px 'Poppins VN';color:#D8434B;background:#FDECEC;padding:4px 10px;border-radius:20px\">Sai<\u002Fspan><\u002Fdiv><p style=\"margin:0 0 8px;font:600 13.5px/1.5 'Poppins VN';color:#0F1B33\">\"What does the professor recommend reading first?\"<\u002Fp><div style=\"background:#F4F8FF;border-radius:12px;padding:11px 13px\"><p style=\"margin:0;font:500 12px/1.55 'Poppins VN';color:#3A4A66\">Có hai đầu sách được nhắc — bạn chọn cuốn \"interesting\" thay vì cuốn được khuyên đọc trước (\"start with...\").<\u002Fp><\u002Fdiv><\u002Fdiv>\n              <div style=\"background:#fff;border:1px solid #E6EEF9;border-radius:18px;padding:16px\"><div style=\"display:flex;justify-content:space-between;margin-bottom:9px\"><span style=\"font:700 12px 'Poppins VN';color:#8A9BB5\">Câu 12<\u002Fspan><span style=\"font:700 10.5px 'Poppins VN';color:#12924E;background:#DFF5E9;padding:4px 10px;border-radius:20px\">Đúng<\u002Fspan><\u002Fdiv><p style=\"margin:0;font:600 13.5px/1.5 'Poppins VN';color:#0F1B33\">\"When is the assignment due?\" — bạn chọn <b style=\"color:#12924E\">Friday<\u002Fb>, chính xác.<\u002Fp><\u002Fdiv>\n              <p style=\"margin:2px 0 0;text-align:center;font:500 12px 'Poppins VN';color:#A6B5CC\">— Hết 12 câu —<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ============ DETAIL: SPEAKING ============ -->\n        <sc-if value=\"{{ isSpeaking }}\">\n        <div>\n          <div style=\"position:sticky;top:0;z-index:30;background:rgba(243,247,254,.9);backdrop-filter:blur(12px);display:flex;align-items:center;gap:12px;padding:8px 16px 12px;border-bottom:1px solid rgba(30,111,242,.08)\">\n            <button onclick=\"{{ goMain }}\" style=\"flex:none;width:36px;height:36px;border-radius:12px;border:1px solid #E1E9F4;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M15 6l-6 6 6 6\" stroke=\"#3A4A66\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n            <div><div style=\"font:700 15px 'Poppins VN';color:#0F1B33\">Chi tiết &amp; cải thiện<\u002Fdiv><div style=\"font:500 11px 'Poppins VN';color:#8A9BB5\">Kỹ năng Nói<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"padding:16px 18px 34px;display:flex;flex-direction:column;gap:14px\">\n            <div style=\"background:#12245A;border-radius:16px;padding:14px 16px\"><div style=\"font:600 10.5px 'Poppins VN';color:#8FB0E0;margin-bottom:3px\">CÂU HỎI<\u002Fdiv><p style=\"margin:0;font:600 13.5px/1.5 'Poppins VN';color:#fff\">\"Describe a time you learned a new skill.\"<\u002Fp><\u002Fdiv>\n            <div style=\"background:#fff;border:1px solid #E6EEF9;border-radius:18px;padding:16px\">\n              <div style=\"display:flex;align-items:center;gap:7px;margin-bottom:10px\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\"><rect x=\"9\" y=\"3\" width=\"6\" height=\"11\" rx=\"3\" stroke=\"#8A9BB5\" stroke-width=\"2\"><\u002Frect><path d=\"M5 11a7 7 0 0 0 14 0M12 18v3\" stroke=\"#8A9BB5\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><span style=\"font:700 12px 'Poppins VN';color:#3A4A66\">Câu trả lời của bạn<\u002Fspan><\u002Fdiv>\n              <p style=\"margin:0;font:500 13.5px/1.7 'Poppins VN';color:#3A4A66\">\"I think it was <span style=\"background:#FDE3E3;color:#B23A42;border-radius:4px;padding:1px 4px;font-weight:600\">good experience<\u002Fspan> when I <span style=\"background:#FDE3E3;color:#B23A42;border-radius:4px;padding:1px 4px;font-weight:600\">learn<\u002Fspan> to cook. I <span style=\"background:#FDE3E3;color:#B23A42;border-radius:4px;padding:1px 4px;font-weight:600\">very happy<\u002Fspan> about it.\"<\u002Fp>\n              <p style=\"margin:10px 0 0;font:500 11px/1.5 'Poppins VN';color:#B23A42\">Đỏ = lỗi ngữ pháp / từ vựng: \"I very happy\" thiếu động từ \"was\"; \"learn\" sai thì.<\u002Fp>\n            <\u002Fdiv>\n            <div style=\"background:#F0F9F3;border:1px solid #C7EAD5;border-radius:18px;padding:16px\">\n              <div style=\"display:flex;align-items:center;gap:7px;margin-bottom:10px\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M12 3l2.2 5.8L20 11l-5.8 2.2L12 19l-2.2-5.8L4 11l5.8-2.2L12 3z\" stroke=\"#12924E\" stroke-width=\"2\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><span style=\"font:700 12px 'Poppins VN';color:#0E7A41\">Bản nâng cấp đề xuất<\u002Fspan><\u002Fdiv>\n              <p style=\"margin:0;font:500 13.5px/1.7 'Poppins VN';color:#26364F\">\"I'd say learning to cook was a <span style=\"background:#CDEFDA;color:#0B6135;border-radius:4px;padding:1px 4px;font-weight:600\">genuinely rewarding experience<\u002Fspan> <span style=\"background:#CDEFDA;color:#0B6135;border-radius:4px;padding:1px 4px;font-weight:600\">because<\u002Fspan> it taught me patience.\"<\u002Fp>\n              <div style=\"margin-top:12px;background:#fff;border-radius:12px;padding:11px 13px\"><div style=\"display:flex;align-items:center;gap:6px;margin-bottom:4px\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M9 18h6M10 21h4M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.3 1 2.1v.2h6v-.2c0-.8.4-1.6 1-2.1A7 7 0 0 0 12 2z\" stroke=\"#12924E\" stroke-width=\"2\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><span style=\"font:700 11px 'Poppins VN';color:#0E7A41\">Vì sao tốt hơn<\u002Fspan><\u002Fdiv><p style=\"margin:0;font:500 12px/1.55 'Poppins VN';color:#3A4A66\">Thay \"good / very happy\" (từ vựng band 4-5) bằng \"genuinely rewarding\" (band 7) → tăng <b>Từ vựng<\u002Fb>. Thêm \"because\" để tăng <b>Sự mạch lạc<\u002Fb>.<\u002Fp><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:14px\">\n              <div style=\"background:#12245A;border-radius:16px;padding:14px 16px\"><div style=\"font:600 10.5px 'Poppins VN';color:#8FB0E0;margin-bottom:3px\">CÂU HỎI 2<\u002Fdiv><p style=\"margin:0;font:600 13.5px/1.5 'Poppins VN';color:#fff\">\"Describe a place you would like to visit and explain why.\"<\u002Fp><\u002Fdiv>\n              <div style=\"background:#F0F9F3;border:1px solid #C7EAD5;border-radius:18px;padding:16px\"><div style=\"display:flex;align-items:center;gap:7px;margin-bottom:10px\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M12 3l2.2 5.8L20 11l-5.8 2.2L12 19l-2.2-5.8L4 11l5.8-2.2L12 3z\" stroke=\"#12924E\" stroke-width=\"2\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><span style=\"font:700 12px 'Poppins VN';color:#0E7A41\">Bản nâng cấp<\u002Fspan><\u002Fdiv><p style=\"margin:0;font:500 13.5px/1.7 'Poppins VN';color:#26364F\">\"I've always been <span style=\"background:#CDEFDA;color:#0B6135;border-radius:4px;padding:1px 4px;font-weight:600\">drawn to<\u002Fspan> Kyoto, <span style=\"background:#CDEFDA;color:#0B6135;border-radius:4px;padding:1px 4px;font-weight:600\">primarily because<\u002Fspan> of its blend of tradition and calm.\"<\u002Fp><\u002Fdiv>\n              <div style=\"background:#12245A;border-radius:16px;padding:14px 16px\"><div style=\"font:600 10.5px 'Poppins VN';color:#8FB0E0;margin-bottom:3px\">CÂU HỎI 3<\u002Fdiv><p style=\"margin:0;font:600 13.5px/1.5 'Poppins VN';color:#fff\">\"Do you prefer studying alone or in a group?\"<\u002Fp><\u002Fdiv>\n              <div style=\"background:#fff;border:1px solid #E6EEF9;border-radius:18px;padding:16px\"><div style=\"display:flex;align-items:center;gap:7px;margin-bottom:10px\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\"><rect x=\"9\" y=\"3\" width=\"6\" height=\"11\" rx=\"3\" stroke=\"#8A9BB5\" stroke-width=\"2\"><\u002Frect><path d=\"M5 11a7 7 0 0 0 14 0M12 18v3\" stroke=\"#8A9BB5\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><span style=\"font:700 12px 'Poppins VN';color:#3A4A66\">Câu trả lời của bạn<\u002Fspan><\u002Fdiv><p style=\"margin:0;font:500 13.5px/1.7 'Poppins VN';color:#3A4A66\">\"I like study <span style=\"background:#FDE3E3;color:#B23A42;border-radius:4px;padding:1px 4px;font-weight:600\">alone because<\u002Fspan> I can <span style=\"background:#FDE3E3;color:#B23A42;border-radius:4px;padding:1px 4px;font-weight:600\">concentrate more better<\u002Fspan>.\"<\u002Fp><p style=\"margin:10px 0 0;font:500 11px/1.5 'Poppins VN';color:#B23A42\">Đỏ: \"study\" thiếu \"-ing\"; \"more better\" lặp so sánh — chỉ cần \"better\".<\u002Fp><\u002Fdiv>\n              <div style=\"background:#F0F9F3;border:1px solid #C7EAD5;border-radius:18px;padding:16px\"><div style=\"display:flex;align-items:center;gap:7px;margin-bottom:10px\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M12 3l2.2 5.8L20 11l-5.8 2.2L12 19l-2.2-5.8L4 11l5.8-2.2L12 3z\" stroke=\"#12924E\" stroke-width=\"2\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><span style=\"font:700 12px 'Poppins VN';color:#0E7A41\">Bản nâng cấp<\u002Fspan><\u002Fdiv><p style=\"margin:0;font:500 13.5px/1.7 'Poppins VN';color:#26364F\">\"I tend to <span style=\"background:#CDEFDA;color:#0B6135;border-radius:4px;padding:1px 4px;font-weight:600\">prefer studying<\u002Fspan> alone, <span style=\"background:#CDEFDA;color:#0B6135;border-radius:4px;padding:1px 4px;font-weight:600\">as it lets me concentrate<\u002Fspan> far better.\"<\u002Fp><\u002Fdiv>\n              <p style=\"margin:2px 0 0;text-align:center;font:500 12px 'Poppins VN';color:#A6B5CC\">— Hết 5 câu Nói —<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n\n      <!-- ============ SHARE SHEET ============ -->\n      <sc-if value=\"{{ shareOpen }}\">\n      <div style=\"position:absolute;inset:0;z-index:60\">\n        <div onclick=\"{{ closeShare }}\" style=\"position:absolute;inset:0;background:rgba(9,17,32,.5);animation:saFade .25s ease both\"><\u002Fdiv>\n        <div style=\"position:absolute;left:0;right:0;bottom:0;background:#fff;border-radius:26px 26px 0 0;padding:10px 20px 26px;box-shadow:0 -12px 40px rgba(9,17,32,.25);animation:saSheet .32s cubic-bezier(.2,.9,.25,1) both\">\n          <div style=\"width:40px;height:5px;border-radius:5px;background:#DCE4EF;margin:2px auto 14px\"><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:14px\">\n            <span style=\"font:800 16px 'Poppins VN';color:#0F1B33\">Chia sẻ kết quả<\u002Fspan>\n            <button onclick=\"{{ closeShare }}\" style=\"width:30px;height:30px;border:none;border-radius:50%;background:#F0F4FA;display:flex;align-items:center;justify-content:center;cursor:pointer\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M6 6l12 12M18 6L6 18\" stroke=\"#7089AD\" stroke-width=\"2.4\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"border-radius:20px;padding:22px 20px;background:linear-gradient(150deg,#2F7BFF,#1B4FCB 60%,#12245A);position:relative;overflow:hidden;box-shadow:0 12px 26px -10px rgba(30,80,200,.55)\">\n            <div style=\"position:absolute;right:-30px;top:-30px;width:130px;height:130px;background:rgba(255,255,255,.10);border-radius:50%\"><\u002Fdiv>\n            <div style=\"position:absolute;right:26px;bottom:-40px;width:100px;height:100px;background:rgba(255,255,255,.07);border-radius:50%\"><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:7px;position:relative\">\n              <div style=\"width:22px;height:22px;background:#fff;border-radius:7px;display:flex;align-items:center;justify-content:center;font:900 13px 'Poppins VN';color:#1B5FE0\">P<\u002Fdiv>\n              <span style=\"font:800 14px 'Poppins VN';color:#fff;letter-spacing:-.02em\">PREPEDU<\u002Fspan>\n              <span style=\"margin-left:auto;font:600 10px 'Poppins VN';color:rgba(255,255,255,.75)\">English Test<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:flex-end;gap:14px;margin-top:16px;position:relative\">\n              <div><div style=\"font:700 10px 'Poppins VN';color:rgba(255,255,255,.8);letter-spacing:.14em\">BAND ƯỚC TÍNH<\u002Fdiv><div style=\"font:900 52px/1 'Poppins VN';color:#fff;letter-spacing:-.03em\">5.5<\u002Fdiv><\u002Fdiv>\n              <div style=\"flex:1;padding-bottom:6px\"><p style=\"margin:0;font:600 12px/1.5 'Poppins VN';color:rgba(255,255,255,.92)\">Mình vừa test IELTS 12 phút trên Prep Edu — bạn được bao nhiêu?<\u002Fp><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:6px;margin-top:14px;position:relative\">\n              <span style=\"font:600 10px 'Poppins VN';color:#fff;background:rgba(255,255,255,.16);padding:4px 9px;border-radius:20px\">Nghe 6.0<\u002Fspan>\n              <span style=\"font:600 10px 'Poppins VN';color:#fff;background:rgba(255,255,255,.16);padding:4px 9px;border-radius:20px\">Đọc 5.5<\u002Fspan>\n              <span style=\"font:600 10px 'Poppins VN';color:#fff;background:rgba(255,255,255,.16);padding:4px 9px;border-radius:20px\">Nói 5.0<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;margin-top:18px;padding:0 2px\">\n            <div style=\"display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer\"><div style=\"width:50px;height:50px;border-radius:16px;background:#06C755;display:flex;align-items:center;justify-content:center\"><span style=\"font:800 18px 'Poppins VN';color:#fff\">L<\u002Fspan><\u002Fdiv><span style=\"font:600 10.5px 'Poppins VN';color:#3A4A66\">LINE<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer\"><div style=\"width:50px;height:50px;border-radius:16px;background:#1877F2;display:flex;align-items:center;justify-content:center\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"#fff\"><path d=\"M22 12a10 10 0 1 0-11.6 9.9v-7H7.9V12h2.5V9.8c0-2.5 1.5-3.9 3.8-3.9 1.1 0 2.2.2 2.2.2v2.5h-1.2c-1.2 0-1.6.8-1.6 1.6V12h2.7l-.4 2.9h-2.3v7A10 10 0 0 0 22 12z\"><\u002Fpath><\u002Fsvg><\u002Fdiv><span style=\"font:600 10.5px 'Poppins VN';color:#3A4A66\">Facebook<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer\"><div style=\"width:50px;height:50px;border-radius:16px;background:linear-gradient(150deg,#00B2FF,#006AFF);display:flex;align-items:center;justify-content:center\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"#fff\"><path d=\"M12 2C6.3 2 2 6.2 2 11.6c0 3 1.4 5.7 3.7 7.5V22l3.4-1.9c.9.3 1.9.4 2.9.4 5.7 0 10-4.2 10-9.6S17.7 2 12 2zm1 12.9l-2.5-2.7-5 2.7 5.5-5.8 2.6 2.7 4.9-2.7-5.5 5.8z\"><\u002Fpath><\u002Fsvg><\u002Fdiv><span style=\"font:600 10.5px 'Poppins VN';color:#3A4A66\">Messenger<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer\"><div style=\"width:50px;height:50px;border-radius:16px;background:#0068FF;display:flex;align-items:center;justify-content:center\"><span style=\"font:800 15px 'Poppins VN';color:#fff\">Zalo<\u002Fspan><\u002Fdiv><span style=\"font:600 10.5px 'Poppins VN';color:#3A4A66\">Zalo<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer\"><div style=\"width:50px;height:50px;border-radius:16px;background:#F0F4FA;display:flex;align-items:center;justify-content:center\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2M12 3v12m0 0l-4-4m4 4l4-4\" stroke=\"#3A4A66\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><span style=\"font:600 10.5 -items:center;justify-content:space-between;margin-bottom:14px\"><h2 style=\"margin:0;font:800 17px 'Poppins VN';color:#16305C\">Kế hoạch 8 tuần<\u002Fh2><span style=\"font:700 11px 'Poppins VN';color:#2F6FED;background:#EEF4FF;padding:4px 10px;border-radius:20px\">5.5 → {{ goalBand }}<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:0\">\n              <div style=\"display:flex;gap:14px\">\n                <div style=\"flex:none;display:flex;flex-direction:column;align-items:center\"><div style=\"width:34px;height:34px;border-radius:50%;background:#2F6FED;color:#fff;display:flex;align-items:center;justify-content:center;font:800 13px 'Poppins VN';box-shadow:0 6px 14px -4px rgba(47,111,237,.6)\">1<\u002Fdiv><div style=\"flex:1;width:2px;background:#DDE6F2;margin:4px 0\"><\u002Fdiv><\u002Fdiv>\n                <div style=\"flex:1;background:#fff;border:1.5px solid #2F6FED;border-radius:16px;padding:14px 16px;margin-bottom:12px\"><div style=\"display:flex;align-items:center;justify-content:space-between\"><span style=\"font:700 13.5px 'Poppins VN';color:#16305C\">Tuần 1 · Nền tảng Ngữ pháp<\u002Fspan><span style=\"font:700 9.5px 'Poppins VN';color:#2F6FED;background:#EEF4FF;padding:3px 8px;border-radius:10px\">ĐANG HỌC<\u002Fspan><\u002Fdiv><p style=\"margin:5px 0 0;font:500 12px/1.5 'Poppins VN';color:#7089AD\">Sửa lỗi thì &amp; cấu trúc câu — điểm yếu #1 của bạn.<\u002Fp><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:14px\">\n                <div style=\"flex:none;display:flex;flex-direction:column;align-items:center\"><div style=\"width:34px;height:34px;border-radius:50%;background:#E7EDF7;color:#8A9BB5;display:flex;align-items:center;justify-content:center;font:800 13px 'Poppins VN'\">2<\u002Fdiv><div style=\"flex:1;width:2px;background:#DDE6F2;margin:4px 0\"><\u002Fdiv><\u002Fdiv>\n                <div style=\"flex:1;background:#fff;border:1px solid #E6EEF9;border-radius:16px;padding:14px 16px;margin-bottom:12px\"><span style=\"font:700 13.5px 'Poppins VN';color:#16305C\">Tuần 2 · Sự mạch lạc &amp; từ nối<\u002Fspan><p style=\"margin:5px 0 0;font:500 12px/1.5 'Poppins VN';color:#7089AD\">Luyện liên kết ý, mở rộng câu trả lời Speaking.<\u002Fp><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:14px\">\n                <div style=\"flex:none;display:flex;flex-direction:column;align-items:center\"><div style=\"width:34px;height:34px;border-radius:50%;background:#E7EDF7;color:#8A9BB5;display:flex;align-items:center;justify-content:center;font:800 13px 'Poppins VN'\">3<\u002Fdiv><div style=\"flex:1;width:2px;background:#DDE6F2;margin:4px 0\"><\u002Fdiv><\u002Fdiv>\n                <div style=\"flex:1;background:#fff;border:1px solid #E6EEF9;border-radius:16px;padding:14px 16px;margin-bottom:12px\"><span style=\"font:700 13.5px 'Poppins VN';color:#16305C\">Tuần 3 · Reading tốc độ<\u002Fspan><p style=\"margin:5px 0 0;font:500 12px/1.5 'Poppins VN';color:#7089AD\">Kỹ thuật skim/scan cho Matching &amp; T/F/NG.<\u002Fp><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:14px\">\n                <div style=\"flex:none;display:flex;flex-direction:column;align-items:center\"><div style=\"width:34px;height:34px;border-radius:50%;background:#E1F5EC;color:#1E9E6B;display:flex;align-items:center;justify-content:center\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M5 12h3l3-7 4 14 3-7h3\" stroke=\"#1E9E6B\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><\u002Fdiv>\n                <div style=\"flex:1;background:#F3F6FC;border:1px dashed #C9D8EC;border-radius:16px;padding:14px 16px\"><span style=\"font:700 13.5px 'Poppins VN';color:#16305C\">Tuần 4–8 · Mock test &amp; bứt tốc<\u002Fspan><p style=\"margin:5px 0 0;font:500 12px/1.5 'Poppins VN';color:#7089AD\">Đề full + chấm chi tiết đến khi đạt {{ goalBand }}.<\u002Fp><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <button style=\"margin-top:22px;width:100%;border:none;border-radius:16px;padding:17px;background:linear-gradient(135deg,#2F6FED,#1B4FCB);color:#fff;font:800 15px 'Poppins VN';cursor:pointer;box-shadow:0 16px 30px -10px rgba(47,111,237,.6);display:flex;align-items:center;justify-content:center;gap:8px\" style-hover=\"transform:translateY(-2px)\">Bắt đầu bài học đầu tiên <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M5 12h14M13 6l6 6-6 6\" stroke=\"#fff\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- DASHBOARD -->\n        <sc-if value=\"{{ isDashboard }}\">\n        <div style=\"min-height:802px\">\n          <div style=\"padding:16px 22px 8px;display:flex;align-items:center;justify-content:space-between\">\n            <div><div style=\"font:600 12px 'Poppins VN';color:#8A9BB5\">Chào bạn 👋<\u002Fdiv><h1 style=\"margin:1px 0 0;font:800 21px 'Poppins VN';color:#16305C;letter-spacing:-.02em\">Luyện tập hôm nay<\u002Fh1><\u002Fdiv>\n            <div style=\"width:38px;height:38px;border-radius:50%;background:linear-gradient(140deg,#B9CBE6,#8FA6C6);border:2px solid #fff;box-shadow:0 2px 6px rgba(15,27,51,.15)\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:14px 22px 30px\">\n            <div style=\"background:linear-gradient(150deg,#F0A030,#E0851A);border-radius:20px;padding:18px;margin-bottom:20px;position:relative;overflow:hidden;box-shadow:0 14px 30px -12px rgba(240,160,48,.5)\">\n              <div style=\"position:absolute;right:-20px;top:-20px;width:110px;height:110px;background:rgba(255,255,255,.16);border-radius:50%\"><\u002Fdiv>\n              <div style=\"font:800 16px 'Poppins VN';color:#fff;position:relative\">Chưa có lộ trình riêng?<\u002Fdiv>\n              <p style=\"margin:4px 0 12px;font:500 12.5px/1.5 'Poppins VN';color:rgba(255,255,255,.95);max-width:230px;position:relative\">Trả lời 4 câu hỏi để nhận lộ trình cá nhân hóa lên band nhanh gấp đôi.<\u002Fp>\n              <button onclick=\"{{ navQuiz }}\" style=\"border:none;border-radius:12px;padding:10px 16px;background:#fff;color:#16305C;font:800 12.5px 'Poppins VN';cursor:pointer;position:relative\">Làm quiz ngay →<\u002Fbutton>\n            <\u002Fdiv>\n            <h2 style=\"margin:0 0 12px;font:800 16px 'Poppins VN';color:#16305C\">Kỹ năng<\u002Fh2>\n            <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px\">\n              <div style=\"background:#fff;border:1px solid #E6EEF9;border-radius:18px;padding:16px\" style-hover=\"border-color:#2F6FED\"><div style=\"width:38px;height:38px;border-radius:12px;background:#EEF4FF;display:flex;align-items:center;justify-content:center;margin-bottom:10px\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M4 5a2 2 0 0 1 2-2h9v18H6a2 2 0 0 0-2 2V5z\" stroke=\"#2F6FED\" stroke-width=\"2\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div style=\"font:700 14px 'Poppins VN';color:#16305C\">Reading<\u002Fdiv><div style=\"font:500 11px 'Poppins VN';color:#8A9BB5\">Bài luyện hằng ngày<\u002Fdiv><\u002Fdiv>\n              <div style=\"background:#fff;border:1px solid #E6EEF9;border-radius:18px;padding:16px\" style-hover=\"border-color:#2F6FED\"><div style=\"width:38px;height:38px;border-radius:12px;background:#E8F0FF;display:flex;align-items:center;justify-content:center;margin-bottom:10px\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M3 10v4h4l5 5V5L7 10H3z\" stroke=\"#2F6FED\" stroke-width=\"2\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M16 8a4 4 0 0 1 0 8\" stroke=\"#2F6FED\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div style=\"font:700 14px 'Poppins VN';color:#16305C\">Listening<\u002Fdiv><div style=\"font:500 11px 'Poppins VN';color:#8A9BB5\">Bài luyện hằng ngày<\u002Fdiv><\u002Fdiv>\n              <div style=\"background:#fff;border:1px solid #E6EEF9;border-radius:18px;padding:16px\" style-hover=\"border-color:#F0A030\"><div style=\"width:38px;height:38px;border-radius:12px;background:#FFF3E3;display:flex;align-items:center;justify-content:center;margin-bottom:10px\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\"><rect x=\"9\" y=\"3\" width=\"6\" height=\"11\" rx=\"3\" stroke=\"#E0851A\" stroke-width=\"2\"><\u002Frect><path d=\"M5 11a7 7 0 0 0 14 0M12 18v3\" stroke=\"#E0851A\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div style=\"font:700 14px 'Poppins VN';color:#16305C\">Speaking<\u002Fdiv><div style=\"font:500 11px 'Poppins VN';color:#8A9BB5\">1 lượt AI miễn phí<\u002Fdiv><\u002Fdiv>\n              <div style=\"background:#fff;border:1px solid #E6EEF9;border-radius:18px;padding:16px\" style-hover=\"border-color:#F0A030\"><div style=\"width:38px;height:38px;border-radius:12px;background:#FFF3E3;display:flex;align-items:center;justify-content:center;margin-bottom:10px\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M4 20l4-1L19 8a2 2 0 0 0-3-3L5 16l-1 4z\" stroke=\"#E0851A\" stroke-width=\"2\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div style=\"font:700 14px 'Poppins VN';color:#16305C\">Writing<\u002Fdiv><div style=\"font:500 11px 'Poppins VN';color:#8A9BB5\">1 lượt AI miễn phí<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:540,&quot;height&quot;:960}}\">\nclass Component extends DCLogic {\n  state = {\n    app: 'analysis',\n    // analysis\n    view: 'main', tab: 'listening', t: 0, shareOpen: false, copied: false,\n    // flow\n    screen: 'quiz', branch: 'personalized', quizStep: 0,\n    answers: { goal: '6.0+', when: '3 tháng tới', purpose: 'Du học', hours: '3–6 giờ' },\n    billing: 'quarterly', plan: 'premium',\n  };\n\n  componentDidMount() { this.startTween(); }\n\n  startTween() {\n    if (this._tweening) return;\n    this._tweening = true;\n    const start = Date.now();\n    const dur = 1200;\n    const id = setInterval(() => {\n      let p = Math.min(1, (Date.now() - start) / dur);\n      const e = 1 - Math.pow(1 - p, 3);\n      this.setState({ t: e });\n      if (p >= 1) clearInterval(id);\n    }, 33);\n  }\n\n  scrollA() { const el = document.getElementById('sa-scroll'); if (el) el.scrollTop = 0; }\n  scrollF() { const el = document.getElementById('lt-scroll'); if (el) el.scrollTop = 0; }\n\n  setTab(tab) { this.setState({ tab }); }\n  goA(view) { this.setState({ app: 'analysis', view }); setTimeout(() => this.scrollA(), 0); }\n  goF(screen, extra) { this.setState(Object.assign({ app: 'flow', screen }, extra || {})); setTimeout(() => this.scrollF(), 0); }\n\n  QUIZ = [\n    { key: 'goal', title: 'Mục tiêu band IELTS của bạn là bao nhiêu?', hint: 'Chọn 1 để bắt đầu', options: ['5.0+', '6.0+', '7.0+', '8.0+'] },\n    { key: 'when', title: 'Bạn dự định thi IELTS khi nào?', hint: 'Giúp chúng tôi tính tiến độ', options: ['Trong vòng 1 tháng tới', '3 tháng tới', '6 tháng tới', '1 năm trở lên'] },\n    { key: 'purpose', title: 'Bạn thi IELTS để làm gì?', hint: 'Lộ trình sẽ ưu tiên đúng kỹ năng', options: ['Du học', 'Định cư', 'Công việc', 'Mục đích khác'] },\n    { key: 'hours', title: 'Mỗi tuần bạn học được bao nhiêu giờ?', hint: 'Để xếp khối lượng phù hợp', options: ['Dưới 3 giờ', '3–6 giờ', '6–10 giờ', 'Trên 10 giờ'] },\n  ];\n\n  PLANS = {\n    free:    { name: 'Free',    price: '$0' },\n    core:    { name: 'Core',    mo: { monthly: '$21', quarterly: '$21', annual: '$17.6' }, billed: { monthly: 'Thanh toán $21 mỗi tháng', quarterly: 'Thanh toán $63 mỗi 3 tháng', annual: 'Thanh toán $211 mỗi năm' } },\n    premium: { name: 'Premium', mo: { monthly: '$29.7', quarterly: '$29.7', annual: '$24.9' }, billed: { monthly: 'Thanh toán $29.7 mỗi tháng', quarterly: 'Thanh toán $89 mỗi 3 tháng', annual: 'Thanh toán $299 mỗi năm' } },\n  };\n  CORE_SAVE = { monthly: '', quarterly: 'Tiết kiệm 16%', annual: 'Tiết kiệm 30%' };\n  PREM_SAVE = { monthly: '', quarterly: 'Tiết kiệm 24%', annual: 'Tiết kiệm 36%' };\n\n  answer(key, val) {\n    const answers = Object.assign({}, this.state.answers, { [key]: val });\n    const step = this.state.quizStep;\n    if (step < this.QUIZ.length - 1) {\n      this.setState({ answers, quizStep: step + 1 });\n      setTimeout(() => this.scrollF(), 0);\n    } else {\n      this.setState({ answers });\n      this.goF('planReady');\n    }\n  }\n  quizBack() {\n    if (this.state.quizStep === 0) this.goA('main');\n    else { this.setState({ quizStep: this.state.quizStep - 1 }); setTimeout(() => this.scrollF(), 0); }\n  }\n\n  destination() { return this.state.branch === 'personalized' ? 'studyPlan' : 'dashboard'; }\n\n  renderVals() {\n    const s = this.state;\n    const overall = 5.5;\n    const bandDisplay = (overall * s.t).toFixed(1);\n    const C = 2 * Math.PI * 70;\n    const arcOffset = C * (1 - (overall / 9) * s.t);\n\n    const q = this.QUIZ[s.quizStep];\n    const progress = this.QUIZ.map((_, i) => ({ color: i <= s.quizStep ? '#2F6FED' : '#DDE6F2' }));\n    const qOptions = q.options.map((label) => ({\n      label, border: '#E6EEF9', bg: '#fff', fg: '#16305C', dot: '#C9D8EC', dotFill: 'transparent',\n      pick: () => this.answer(q.key, label),\n    }));\n\n    const bil = s.billing;\n    const seg = (on) => ({ w: on ? '700' : '600', bg: on ? '#fff' : 'transparent', fg: on ? '#16305C' : '#7089AD', sh: on ? '0 2px 6px rgba(15,27,51,.1)' : 'none' });\n    const m = seg(bil === 'monthly'), qt = seg(bil === 'quarterly'), a = seg(bil === 'annual');\n\n    const plan = this.PLANS[s.plan] || this.PLANS.premium;\n    const planPrice = s.plan === 'free' ? '$0' : (plan.mo ? plan.mo[bil] : '$0');\n    const planBilled = s.plan === 'free' ? 'Miễn phí mãi mãi' : (plan.billed ? plan.billed[bil] : '');\n\n    return {\n      appAnalysis: s.app === 'analysis', appFlow: s.app === 'flow',\n\n      // ---- analysis ----\n      isMain: s.view === 'main', isListening: s.view === 'detail-listening', isSpeaking: s.view === 'detail-speaking',\n      bandDisplay, arcDash: C, arcOffset,\n      isAll: s.tab === 'all', notAll: s.tab !== 'all',\n      isTabL: s.tab === 'listening', notTabL: s.tab !== 'listening',\n      isTabR: s.tab === 'reading', notTabR: s.tab !== 'reading',\n      isTabS: s.tab === 'speaking', notTabS: s.tab !== 'speaking',\n      setAll: () => this.setTab('all'), setL: () => this.setTab('listening'), setR: () => this.setTab('reading'), setS: () => this.setTab('speaking'),\n      goListening: () => this.goA('detail-listening'), goSpeaking: () => this.goA('detail-speaking'), goMain: () => this.goA('main'),\n      shareOpen: s.shareOpen,\n      openShare: () => this.setState({ shareOpen: true, copied: false }),\n      closeShare: () => this.setState({ shareOpen: false }),\n      copyLabel: s.copied ? 'Đã chép' : 'Chép',\n      copyLink: () => { try { if (navigator.clipboard) navigator.clipboard.writeText('https://prep.edu/r/beebro-5.5'); } catch (e) {} this.setState({ copied: true }); },\n\n      // analysis -> flow\n      goPersonalized: () => this.goF('quiz', { branch: 'personalized', quizStep: 0 }),\n      goFreeFlow: () => this.goF('pricing', { branch: 'free' }),\n\n      // ---- flow ----\n      isQuiz: s.screen === 'quiz', isPlanReady: s.screen === 'planReady', isPricing: s.screen === 'pricing',\n      isCheckout: s.screen === 'checkout', isStudyPlan: s.screen === 'studyPlan', isDashboard: s.screen === 'dashboard',\n      progress, quizLabel: (s.quizStep + 1) + '/4', quizKey: 'q' + s.quizStep,\n      qTitle: q.title, qHint: q.hint, qOptions,\n      quizBack: () => this.quizBack(),\n\n      // demo nav\n      navAnalysis: () => this.goA('main'),\n      navQuiz: () => this.goF('quiz', { branch: 'personalized', quizStep: 0 }),\n      navPlanReady: () => this.goF('planReady'),\n      navPricing: () => this.goF('pricing'),\n      navCheckout: () => this.goF('checkout'),\n      navStudyPlan: () => this.goF('studyPlan', { branch: 'personalized' }),\n      navDashboard: () => this.goF('dashboard'),\n      pricingBack: () => { if (s.branch === 'personalized') return this.goF('planReady'); this.goA('main'); },\n\n      setMonthly: () => this.setState({ billing: 'monthly' }),\n      setQuarterly: () => this.setState({ billing: 'quarterly' }),\n      setAnnual: () => this.setState({ billing: 'annual' }),\n      mWeight: m.w, mBg: m.bg, mFg: m.fg, mShadow: m.sh,\n      qWeight: qt.w, qBg: qt.bg, qFg: qt.fg, qShadow: qt.sh,\n      aWeight: a.w, aBg: a.bg, aFg: a.fg, aShadow: a.sh,\n\n      coreMo: this.PLANS.core.mo[bil], coreBilled: this.PLANS.core.billed[bil], coreSave: this.CORE_SAVE[bil], coreSaveShow: !!this.CORE_SAVE[bil],\n      premMo: this.PLANS.premium.mo[bil], premBilled: this.PLANS.premium.billed[bil], premSave: this.PREM_SAVE[bil], premSaveShow: !!this.PREM_SAVE[bil],\n      chooseFree: () => this.goF(this.destination(), { plan: 'free' }),\n      chooseCore: () => this.goF('checkout', { plan: 'core' }),\n      choosePremium: () => this.goF('checkout', { plan: 'premium' }),\n\n      planName: plan.name, planPrice, planBilled,\n      confirmPay: () => this.goF(this.destination()),\n\n      goalBand: (s.answers.goal || '').replace('+', ''),\n      examWhen: s.answers.when, hoursWeek: s.answers.hours,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
